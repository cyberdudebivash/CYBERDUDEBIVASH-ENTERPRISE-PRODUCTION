name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build Vite app
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Sync root static assets for branch-based deployment
        run: |
          # Extract built asset filenames
          JS_FILE=$(ls dist/assets/index-*.js | head -1 | xargs basename)
          CSS_FILE=$(ls dist/assets/index-*.css | head -1 | xargs basename)
          ICO_FILE=$(ls dist/assets/favicon-*.ico 2>/dev/null | head -1 | xargs basename 2>/dev/null || true)

          # Copy to root assets/
          cp "dist/assets/$JS_FILE" "assets/$JS_FILE"
          cp "dist/assets/$CSS_FILE" "assets/$CSS_FILE"
          [ -n "$ICO_FILE" ] && cp "dist/assets/$ICO_FILE" "assets/$ICO_FILE" || true

          # Update index.html with new asset references
          sed -i "s|crossorigin src=\"/assets/index-[^\"]*\.js\"|crossorigin src=\"/assets/$JS_FILE\"|g" index.html
          sed -i "s|crossorigin href=\"/assets/index-[^\"]*\.css\"|crossorigin href=\"/assets/$CSS_FILE\"|g" index.html

          # Commit only if there are changes
          git config --local user.email "ci@cyberdudebivash.com"
          git config --local user.name "CDB Build Bot"
          git add assets/ index.html
          git diff --staged --quiet || git commit -m "chore: sync built assets to root for branch deployment [skip ci]"
          git diff --staged --quiet || git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
