name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production site (vite build + assemble + verify)
        run: npm run build
        env:
          NODE_ENV: production

      # TEMPORARY — Phase 1 bridge only. Remove once Cloudflare Pages is confirmed
      # building from source itself (build command `npm ci --ignore-scripts && npm
      # run build`, output directory `dist`) — see docs/audit/BUILD_PIPELINE_MIGRATION.md
      # for the exact Phase 2 cleanup. Cloudflare currently has no build step of its
      # own and just deploys the repo root as committed, so this keeps that root
      # mirror current in the meantime. Deliberately full-file replacement (not a
      # sed patch), and deliberately no skip-ci tag: Cloudflare's own Git integration
      # honors that tag too, and during this bridge period it still needs to see
      # the commit (that exact collision is what caused the last production incident).
      - name: "[TEMPORARY] Mirror dist/ to root for Cloudflare"
        run: |
          set -euo pipefail
          find assets -maxdepth 1 -type f \( -name "index-*.js" -o -name "index-*.css" -o -name "vendor-*.js" -o -name "favicon-*.ico" \) -delete
          cp dist/assets/*.js dist/assets/*.css assets/ 2>/dev/null || true
          ls dist/assets/favicon-*.ico >/dev/null 2>&1 && cp dist/assets/favicon-*.ico assets/ || true
          cp dist/index.html index.html

          git config --local user.email "ci@cyberdudebivash.com"
          git config --local user.name "CDB Build Bot"
          git add assets/ index.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: mirror dist/ to root for Cloudflare (temporary bridge — see BUILD_PIPELINE_MIGRATION.md)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    steps:
      - name: Wait for any in-progress Pages deployment to clear
        run: sleep 20
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
