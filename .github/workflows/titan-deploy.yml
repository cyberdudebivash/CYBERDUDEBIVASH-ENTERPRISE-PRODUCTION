name: Titan Deploy

# PRD-1: manual-only, by design. Unlike titan-ci.yml (which runs on every
# push/PR touching titan/**), this workflow is never triggered automatically
# — an accidental push should never attempt a real deployment. It requires a
# human to pick a target environment and press "Run workflow".
#
# This workflow has never succeeded past the "Config check"/"Secrets check"
# steps in this project: there has never been a Cloudflare account, API
# token, or any of the CLOUDFLARE_*/AUTH_SECRET repository secrets it
# references, in any environment this project has run in (DECISION_LOG.md).
# It is included as real, reviewable, structurally-correct infrastructure —
# the automation that would run a deployment the day those secrets exist —
# not as a claim that a deployment has happened. See DEPLOYMENT_GUIDE.md's
# "First real deploy checklist" for what turns this from dormant to real.
#
# Fully independent of titan-ci.yml and deploy.yml (the marketing site's own
# pipeline): no shared jobs, no shared secrets, no way for a run of this
# workflow to affect either.
on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to deploy (must match a wrangler.toml [env.*] block)"
        required: true
        type: choice
        options:
          - staging
          - production
      skip_smoke_test:
        description: "Skip the post-deploy smoke test"
        required: false
        type: boolean
        default: false

# SEC-1: explicit least-privilege GITHUB_TOKEN permissions, same reasoning as
# titan-ci.yml — every real credential this workflow uses (CLOUDFLARE_API_TOKEN/
# CLOUDFLARE_ACCOUNT_ID) is a repository/environment secret consumed directly
# by wrangler, not the GitHub API; read-only `contents` (for checkout) is the
# complete real requirement.
permissions:
  contents: read

defaults:
  run:
    working-directory: titan

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: titan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Full quality gate (typecheck, lint, format, build, test)
        run: npm run ci

  config-and-secrets-check:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    defaults:
      run:
        working-directory: titan/packages/platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install platform dependencies
        run: npm ci
        working-directory: titan

      - name: Check wrangler.toml has no unfilled placeholders for this environment
        run: node scripts/check-wrangler-config.mjs --env ${{ inputs.target_environment }}

      - name: Check required secrets are configured for this environment
        run: node scripts/validate-secrets.mjs --env ${{ inputs.target_environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  migrate-database:
    needs: config-and-secrets-check
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    defaults:
      run:
        working-directory: titan/packages/platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: titan

      # Every migration in this repository is additive-only (verified — no
      # DROP TABLE/DROP COLUMN anywhere in migrations/*.sql, PLATFORM_FOUNDATION.md's
      # PRD-1 section), so applying before the new Worker code deploys is the
      # standard, safe "expand" half of an expand/contract schema change —
      # old code ignores columns/tables it doesn't reference yet.
      - name: Apply pending D1 migrations (remote)
        run: npx wrangler d1 migrations apply titan-platform-${{ inputs.target_environment }}-db --env ${{ inputs.target_environment }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-worker:
    needs: migrate-database
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    defaults:
      run:
        working-directory: titan/packages/platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: titan

      - name: Deploy Worker
        run: npx wrangler deploy --env ${{ inputs.target_environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    defaults:
      run:
        working-directory: titan/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: titan

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.TITAN_API_BASE_URL }}

      # ARCHITECTURE.md's own "Deployment target (Titan app)" row: Pages
      # hosts the app shell. Project name matches the environment so
      # staging/production are genuinely separate Pages projects, not one
      # project with environment-specific traffic splitting.
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=titan-web-${{ inputs.target_environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke-test:
    needs: [deploy-worker, deploy-pages]
    if: ${{ !inputs.skip_smoke_test }}
    runs-on: ubuntu-latest
    # Real gap found 2026-07-23: this job never declared `environment:`,
    # unlike every job above it — meaning it could only ever see repository-
    # level vars/secrets, never an environment-scoped TITAN_API_BASE_URL
    # (which genuinely needs a different value per environment, since
    # staging and production get different Worker URLs). Matches
    # deploy-pages's own environment scoping now.
    environment: ${{ inputs.target_environment }}
    defaults:
      run:
        working-directory: titan/packages/platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke test against the deployed Worker
        run: node scripts/smoke-test.mjs --base-url ${{ vars.TITAN_API_BASE_URL }}
