name: Titan CI

on:
  push:
    branches:
      - main
    paths:
      - "titan/**"
      - ".github/workflows/titan-ci.yml"
  pull_request:
    paths:
      - "titan/**"
      - ".github/workflows/titan-ci.yml"

# SEC-1: explicit least-privilege GITHUB_TOKEN permissions — this workflow
# only ever checks out the repository and runs local quality gates; it never
# calls the GitHub API for anything else (no PR comments, no releases, no
# packages), so read-only `contents` is the complete real requirement, not
# an arbitrary restriction. Matches the same explicit-permissions pattern
# deploy.yml (the marketing site's own pipeline) already uses.
permissions:
  contents: read

# Fully independent of deploy.yml: this workflow only ever touches titan/,
# never installs the root package.json, and has no bridge/mirror step.
# Nothing here can affect the marketing site's build or deployment.
jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: titan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: titan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
