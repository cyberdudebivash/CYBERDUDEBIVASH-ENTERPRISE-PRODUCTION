<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERDUDEBIVASH® | Page Not Found</title>
  <meta name="robots" content="noindex">
  <style>
    body { margin: 0; background: #020810; color: #94a3b8; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    h1 { color: #00d4ff; font-size: 4rem; margin: 0; }
    p { color: #64748b; margin: 1rem 0; }
    a { color: #00d4ff; text-decoration: none; border: 1px solid #00d4ff; padding: 0.5rem 1.5rem; border-radius: 4px; }
    a:hover { background: #00d4ff20; }
  </style>
  <script>
    // GitHub Pages SPA routing: redirect to root with hash for React Router
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash || '';
    if (path !== '/') {
      window.location.replace('/?redirect=' + encodeURIComponent(path + search) + hash);
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>THREAT NOT FOUND — Redirecting to CYBERDUDEBIVASH® Command Center...</p>
    <a href="/">← Return to Platform</a>
  </div>
</body>
</html>
